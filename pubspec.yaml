name: electro_farm
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  fl_chart: ^1.1.1
  socket_io_client: ^3.1.4
  fluttertoast: ^9.0.0
  dio: ^5.9.1
  collection: ^1.19.1
  geolocator: ^14.0.2
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/electrofarm_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/electrofarm_icon.png
    - assets/icon/

